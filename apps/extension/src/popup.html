<!doctype html><html dir="rtl"><head><meta charset="utf-8"><style>@import url('https://fonts.googleapis.com/css2?family=Alexandria:wght@600;700&family=IBM+Plex+Sans+Arabic:wght@400;500&display=swap');*{box-sizing:border-box}body{width:360px;margin:0;padding:18px;background:radial-gradient(circle at 50% -20%,#27375f,#10172b 55%);color:#fff6de;font:14px 'IBM Plex Sans Arabic',sans-serif}.brand{font:700 19px Alexandria}.brand span{color:#90e4ff}.hint{margin:20px 0 12px;color:#aab9d7;font-size:12px}label{display:block;margin:9px 0 4px;color:#cbd8f1;font-size:12px}input{width:100%;border:1px solid #ffffff18;border-radius:10px;background:#0d1629;padding:10px;color:#fff6de;font:inherit}input:focus{outline:2px solid #90e4ff;outline-offset:2px}button{width:100%;margin-top:15px;border:0;border-radius:12px;background:#90e4ff;padding:11px;color:#10172b;font:700 14px 'IBM Plex Sans Arabic';cursor:pointer}button:hover{background:#cff4ff}#status{min-height:18px;margin:10px 0 0;text-align:center;color:#d4b7ff;font-size:12px}.note{margin-top:16px;border-top:1px solid #ffffff14;padding-top:12px;color:#8091b4;font-size:11px;line-height:1.6}</style></head><body><div class="brand">MS<span>Party</span></div><p class="hint">وصّل تابك بالسهرة — التحكم فقط، بدون نقل فيديو أو صوت.</p><label for="apiUrl">رابط موقع MSParty</label><input id="apiUrl" placeholder="https://msparty.example"><label for="syncUrl">رابط خادم المزامنة</label><input id="syncUrl" placeholder="https://sync.msparty.example"><label for="email">البريد الإلكتروني</label><input id="email" type="email" placeholder="you@example.com"><label for="password">كلمة المرور</label><input id="password" type="password" placeholder="••••••••"><label for="partyId">معرّف البارتي</label><input id="partyId" placeholder="من رابط البارتي"><button id="save">وصّلني بالسهرة</button><p id="status" aria-live="polite"></p><p class="note">لو أنت Viewer، تابك هيتابع الهوست تلقائيًا.</p><script src="popup.js"></script></body></html>
